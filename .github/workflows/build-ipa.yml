name: Build Unsigned iOS IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to trigger the build manually

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install 

      - name: Generate iOS Native Code (Expo Prebuild)
        run: npx expo prebuild --platform ios

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build Unsigned App
        # This compiles the app for physical iOS devices but forcefully strips the Apple signing requirements
        run: |
          xcodebuild -workspace ios/test.xcworkspace \
            -scheme test \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ios/build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build

      - name: Convert .app to .ipa
        # An .ipa file is essentially just the .app bundle placed inside a 'Payload' folder and zipped
        run: |
          mkdir -p Payload
          mv ios/build/Build/Products/Release-iphoneos/test.app Payload/
          zip -qq -r unsigned_build.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ios-ipa
          path: unsigned_build.ipa
